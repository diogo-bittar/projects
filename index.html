<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <!-- Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="WL Salão de Beleza e Barbearia - Serviços de qualidade para beleza e barbeiro. Barbearia e salão profissional.">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="color-scheme" content="dark light">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Title -->
    <title>WL Salão de Beleza e Barbearia</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVJkEZSMUkrQ6usKu8zQwABS8DfwoQiyzIUSEjD6lOnCPZApt1mP2DJqzF1tfy9PczickWQO1toQ==" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
    <!-- CABEÇALHO SIMPLES -->
    <header class="cabecalho" role="banner" aria-label="Cabeçalho do site">
        <div class="container">
            <div class="logo">
                <h1>WL</h1>
            </div>
            <button class="botao-tema" id="botao-tema" aria-label="Alternar entre modo escuro e claro" title="Alternar tema">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main id="conteudo-principal" role="main" aria-label="Conteúdo principal">
        <!-- SEÇÃO DE ABERTURA -->
        <section class="hero" id="inicio" role="region" aria-labelledby="hero-title">
            <div class="container">
                <div class="hero-area">
                    <h1 class="titulo" id="hero-title">WL Salão de Beleza e Barbearia</h1>
                    <!-- BLOCO DE SERVIÇOS -->
                    <div class="servicos" role="region" aria-label="Seção de serviços do salão">
                        <a href="./barbearia.html" class="servico" title="Ir para Barbearia" aria-label="Barbearia - Cortes e barba">
                            <div class="icone" aria-hidden="true"><i class="fas fa-scissors"></i></div>
                            <h2>Barbearia</h2>
                            <p>Cortes, barbas e cuidados masculinos</p>
                        </a>

                        <a href="./salao.html" class="servico" title="Ir para Salão" aria-label="Salão - Cabelo e manicure">
                            <div class="icone" aria-hidden="true"><i class="fas fa-wand-magic-sparkles"></i></div>
                            <h2>Salão</h2>
                            <p>Cabelo, manicure e tratamentos de beleza</p>
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- RODAPÉ -->
    <footer class="footer" role="contentinfo" aria-label="Rodapé">
        <p>&copy; 2026 WL Salão de Beleza e Barbearia. Todos os direitos reservados.</p>
        <p class="creditos">Desenvolvido por <strong>BACKDORES</strong></p>
    </footer>
    
    <!-- Scripts -->
    <script src="./script.js"></script>
</body>
</html>
