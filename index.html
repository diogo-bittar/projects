<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <!-- Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WL Salão de Beleza e Barbearia - Serviços de qualidade para beleza e barbeiro">
    <meta name="theme-color" content="#1a1a1a">
    
    <!-- Title -->
    <title>WL Salão de Beleza e Barbearia</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVJkEZSMUkrQ6usKu8zQwABS8DfwoQiyzIUSEjD6lOnCPZApt1mP2DJqzF1tfy9PczickWQO1toQ==" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
    <!-- HEADER -->
    <header class="header" role="banner">
        <div class="container">
            <div class="logo">
                <h1>WL</h1>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <!-- HERO SECTION -->
        <section class="hero" id="inicio" role="main">
            <div class="container">
                <div class="hero-content">
                    <h1 class="titulo-principal">WL Salão de Beleza e Barbearia</h1>
                    <p class="subtitulo">Escolha o serviço desejado</p>

                    <!-- SERVICES SELECTION -->
                    <div class="servicos-container" role="region" aria-label="Seção de Serviços">
                        <a href="#" class="servico-btn" title="Ir para serviços de Barbearia">
                            <div class="servico-icon" aria-hidden="true"><i class="fas fa-scissors"></i></div>
                            <h2>Barbearia</h2>
                            <p>Cortes, barbas e cuidados masculinos</p>
                        </a>

                        <a href="#" class="servico-btn" title="Ir para serviços de Salão">
                            <div class="servico-icon" aria-hidden="true"><i class="fas fa-wand-magic-sparkles"></i></div>
                            <h2>Salão</h2>
                            <p>Cabelo, manicure e cuidados femininos</p>
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer" role="contentinfo">
        <p>&copy; 2026 WL Salão de Beleza e Barbearia. Todos os direitos reservados.</p>
        <p class="footer-credit">Desenvolvido por <strong>BACKDORES</strong></p>
    </footer>
</body>
</html>
